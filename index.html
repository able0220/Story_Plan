<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스토리 기획서</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --point-blue: #2c5fb3;
            --border-gray: #e2e8f0;
            --label-bg: #f8fafc;
            --text-black: #1e293b;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: var(--text-black);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 50px 40px;
            border-radius: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* [수정] 헤더 레이아웃: 글자 깨짐 방지 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end; /* 하단 라인에 맞춤 */
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #1a1a1a;
            flex-wrap: wrap; /* 모바일에서 자동 줄바꿈 */
            gap: 20px;
        }

        .title-area { 
            display: flex; 
            align-items: center; 
            gap: 12px;
            flex-shrink: 0; /* 제목이 찌그러지지 않게 방지 */
        }
        .logo-box { font-weight: 900; color: #fff; background: #2c5fb3; padding: 2px 8px; border-radius: 2px; font-size: 14px; }
        .main-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; white-space: nowrap; }

        .header-info { 
            display: flex; 
            gap: 20px; 
            flex-shrink: 0;
        }
        .info-group { display: flex; align-items: center; gap: 8px; }
        .info-group label { font-size: 14px; font-weight: 600; color: #444; white-space: nowrap; }
        
        .info-group input {
            border: none;
            border-bottom: 1px solid #cbd5e1;
            width: 140px;
            padding: 6px 2px 4px 2px;
            font-size: 15px;
            font-family: 'Pretendard', sans-serif;
            outline: none;
            text-align: center;
            line-height: 1.4;
            background: transparent;
        }

        h2 {
            font-size: 20px;
            font-weight: 800;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
        }
        h2::before {
            content: "";
            width: 4px;
            height: 20px;
            background-color: #3b82f6;
            margin-right: 12px;
            border-radius: 4px;
        }

        .section-box {
            border: 1px solid var(--border-gray);
            border-radius: 6px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .box-label {
            background-color: var(--label-bg);
            padding: 10px 15px;
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            border-bottom: 1px solid var(--border-gray);
        }

        textarea {
            width: 100%;
            border: none;
            padding: 15px;
            box-sizing: border-box;
            font-size: 15px;
            line-height: 1.6;
            font-family: inherit;
            resize: none;
            outline: none;
            display: block;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .character-card {
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            position: relative;
            background: #fff;
        }
        .char-col { display: flex; flex-direction: column; }
        .char-label { font-size: 11px; font-weight: 700; color: #3b82f6; margin-bottom: 6px; }
        .char-col textarea {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
        }

        .add-btn {
            width: 100%; padding: 14px; background: #fff; border: 1px dashed #cbd5e1;
            border-radius: 8px; color: #94a3b8; font-weight: 600; cursor: pointer;
        }

        .delete-btn {
            position: absolute; top: 5px; right: 5px; border: none; background: none; 
            color: #ef4444; cursor: pointer; font-size: 18px; font-weight: bold;
        }

        .footer-text {
            margin-top: 50px;
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .save-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 999; }
        .btn-save {
            background: #1e293b; color: white; border: none; padding: 16px 40px;
            border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        #result-preview {
            display: none; max-width: 800px; margin: 30px auto; padding: 20px; 
            background: #fff; border-radius: 12px; text-align: center;
        }
        #result-preview img { width: 100%; border: 1px solid #ddd; border-radius: 8px; margin-top: 15px; }

        /* [수정] 스마트폰 화면 최적화 미디어 쿼리 */
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            header { 
                flex-direction: column; 
                align-items: flex-start; /* 왼쪽 정렬 */
                gap: 15px;
            }
            .title-area { width: 100%; }
            .header-info { 
                width: 100%; 
                flex-direction: column; 
                gap: 10px; 
                align-items: flex-start;
            }
            .info-group { width: 100%; }
            .info-group input { width: 100%; text-align: left; }
            
            .character-card { flex-direction: column; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <header>
        <div class="title-area">
            <div class="logo-box">ABLE</div>
            <div class="main-title">스토리 기획</div>
        </div>
        <div class="header-info">
            <div class="info-group">
                <label>학교명</label>
                <input type="text">
            </div>
            <div class="info-group">
                <label>학번 / 이름</label>
                <input type="text">
            </div>
        </div>
    </header>

    <section>
        <h2>1. 세계관 및 컨셉</h2>
        <div class="section-box">
            <div class="box-label">공간 및 시간적 배경</div>
            <textarea oninput="autoResize(this)" rows="1" placeholder="작품의 무대가 되는 세계를 설명해주세요."></textarea>
        </div>
        <div class="section-box">
            <div class="box-label">장르 및 전체적인 톤</div>
            <textarea oninput="autoResize(this)" rows="1" placeholder="예: 판타지, 스릴러 / 몽환적이고 어두운 분위기"></textarea>
        </div>
    </section>

    <section>
        <h2>2. 줄거리 전개 구조</h2>
        <div class="section-box">
            <div class="box-label">기본 줄거리</div>
            <textarea oninput="autoResize(this)" rows="3" placeholder="핵심 내용을 자유롭게 작성해 주세요."></textarea>
        </div>
        <div class="grid-2">
            <div class="section-box">
                <div class="box-label">스토리 구조</div>
                <textarea oninput="autoResize(this)" rows="1" placeholder="예: 시작 → 갈등 → 전환점 → 결말"></textarea>
            </div>
            <div class="section-box">
                <div class="box-label">핵심 갈등</div>
                <textarea oninput="autoResize(this)" rows="1" placeholder="주인공이 극복할 과제"></textarea>
            </div>
        </div>
    </section>

    <section id="char-section">
        <h2>3. 캐릭터 설정</h2>
        <div id="character-list">
            <div class="character-card">
                <div class="char-col" style="flex: 1.5;">
                    <div class="char-label">캐릭터 유형</div>
                    <textarea oninput="autoResize(this)" rows="1">주인공</textarea>
                </div>
                <div class="char-col" style="flex: 1.5;">
                    <div class="char-label">이름</div>
                    <textarea oninput="autoResize(this)" rows="1" placeholder="이름"></textarea>
                </div>
                <div class="char-col" style="flex: 4;">
                    <div class="char-label">목표 & 결핍</div>
                    <textarea oninput="autoResize(this)" rows="1" placeholder="내용 입력"></textarea>
                </div>
            </div>
        </div>
        <button class="add-btn" id="add-btn-element" onclick="addCharacter()">+ 캐릭터 추가하기</button>
    </section>

   <section>
        <h2>4. 타깃 및 매체 설정</h2>
        <div class="grid-2">
            <div class="section-box">
                <div class="box-label">주요 타깃층</div>
                <textarea oninput="autoResize(this)" rows="1" placeholder="예: 어린이, 청소년, 성인 등"></textarea>
            </div>
            <div class="section-box">
                <div class="box-label">희망 매체</div>
                <textarea oninput="autoResize(this)" rows="1" placeholder="예: 웹툰, 소설, 드라마 등"></textarea>
            </div>
        </div>
    </section>

    <div class="footer-text">STORY PLANNER WORKSHEET | (주) 에이블</div>
</div>

<div id="result-preview">
    <h3 style="color:#2c5fb3; margin-bottom:5px;">이미지가 생성되었습니다!</h3>
    <p style="font-size:13px; color:#666; margin-bottom:15px;">이미지를 길게 눌러 <b>'사진 앱에 저장'</b> 하세요.</p>
    <div id="image-holder"></div>
</div>

<div class="save-bar">
    <button class="btn-save" onclick="saveToImage()">📷 사진으로 저장하기</button>
</div>

<script>
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    function addCharacter() {
        const list = document.getElementById('character-list');
        const div = document.createElement('div');
        div.className = 'character-card';
        div.innerHTML = `
            <div class="char-col" style="flex: 1.5;"><div class="char-label">캐릭터 유형</div><textarea oninput="autoResize(this)" rows="1" placeholder="조연/라이벌"></textarea></div>
            <div class="char-col" style="flex: 1.5;"><div class="char-label">이름</div><textarea oninput="autoResize(this)" rows="1" placeholder="이름"></textarea></div>
            <div class="char-col" style="flex: 4;"><div class="char-label">목표 & 결핍</div><textarea oninput="autoResize(this)" rows="1" placeholder="내용"></textarea></div>
            <button class="delete-btn" onclick="this.parentElement.remove()">✕</button>
        `;
        list.appendChild(div);
        div.querySelectorAll('textarea').forEach(t => autoResize(t));
    }

    async function saveToImage() {
        const area = document.getElementById('capture-area');
        const addBtn = document.getElementById('add-btn-element');
        const delBtns = document.querySelectorAll('.delete-btn');
        const preview = document.getElementById('result-preview');
        const holder = document.getElementById('image-holder');

        addBtn.style.visibility = 'hidden';
        delBtns.forEach(b => b.style.visibility = 'hidden');

        try {
            const canvas = await html2canvas(area, {
                scale: 2,
                useCORS: true,
                backgroundColor: "#ffffff",
                logging: false
            });

            const imgData = canvas.toDataURL('image/png');
            holder.innerHTML = `<img src="${imgData}" />`;
            preview.style.display = 'block';
            preview.scrollIntoView({ behavior: 'smooth' });

            const link = document.createElement('a');
            link.href = imgData;
            link.download = '스토리_기획서.png';
            link.click();
        } catch (err) {
            alert('이미지 생성 실패');
        } finally {
            addBtn.style.visibility = 'visible';
            delBtns.forEach(b => b.style.visibility = 'visible');
        }
    }

    window.onload = () => {
        document.querySelectorAll('textarea').forEach(t => autoResize(t));
    };
</script>

</body>
</html>
